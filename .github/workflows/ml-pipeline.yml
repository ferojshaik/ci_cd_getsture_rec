# ---------------------------------------------------------------------------
# CD: Full ML pipeline (validate → train → export → register)
# ---------------------------------------------------------------------------
# Why: Train and export in CI so you get a reproducible artifact without
# running the pipeline on your machine. Trigger manually or on a schedule.
# ---------------------------------------------------------------------------

name: ML Pipeline (Train & Export)

on:
  workflow_dispatch:   # Manual: Actions tab → "Run workflow"
  schedule:
    # Optional: run weekly (e.g. retrain on new data). Comment out if not needed.
    - cron: '0 2 * * 0'   # 02:00 UTC every Sunday

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set project directory
        id: project
        run: |
          if [ -d gesture-recognition ] && [ -f gesture-recognition/requirements.txt ]; then
            echo "dir=gesture-recognition" >> $GITHUB_OUTPUT
          elif [ -f requirements.txt ]; then
            echo "dir=." >> $GITHUB_OUTPUT
          else
            echo "::error::No requirements.txt found"
            ls -la
            exit 1
          fi
          echo "Using project dir: ${{ steps.project.outputs.dir }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd ${{ steps.project.outputs.dir }}
          pip install -r requirements.txt

      - name: Run full pipeline
        run: |
          cd ${{ steps.project.outputs.dir }}
          python run_pipeline.py

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-run-${{ github.run_id }}
          path: ${{ steps.project.outputs.dir }}/runs/
          retention-days: 30
